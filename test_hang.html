<!DOCTYPE html>
<html>
<head>
  <title>Test Hang</title>
</head>
<body>
  <script>
    window.gm_authFailure = () => {
      console.log("gm_authFailure called!");
    };
    const script = document.createElement("script");
    script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyCPYoWbh0n0jPYkIQmN5NuEn0CFMtoeYMs&libraries=places";
    document.head.appendChild(script);

    setTimeout(() => {
      console.log("Calling findPlaceFromQuery");
      try {
        const service = new google.maps.places.PlacesService(document.createElement("div"));
        service.findPlaceFromQuery(
          { query: "hilton", fields: ["place_id"] },
          (results, status) => {
            console.log("Callback!", status, results);
          }
        );
      } catch (e) {
        console.error("Caught exception:", e);
      }
    }, 2000);
  </script>
</body>
</html>
