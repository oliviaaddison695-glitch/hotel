<!DOCTYPE html>
<html>
<head>
  <style>#demo { width: 100px; height: 100px; }</style>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      console.log("Error caught: " + msg);
      if (error && error.stack) console.log("Stack: " + error.stack);
    };
  </script>
</head>
<body>
  <div id="demo"></div>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCPYoWbh0n0jPYkIQmN5NuEn0CFMtoeYMs&libraries=marker,places,geometry"></script>
  <script>
    setTimeout(async () => {
        try {
            const map = new google.maps.Map(document.getElementById("demo"), {
                center: {lat: 0, lng: 0},
                zoom: 1,
                mapId: "DEMO_MAP_ID"
            });
            const infoWindow = new google.maps.InfoWindow();
            infoWindow.setContent("Test");
            infoWindow.open({map: map, anchor: undefined}); // This throws getRootNode!
            console.log("InfoWindow created successfully");
        } catch (e) {
            console.error(e);
        }
    }, 1000);
  </script>
</body>
</html>
