<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Info Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero" id="heroSection">
      <div class="hero-card">
        <h1>Hotel Info Explorer</h1>
        <p>Search a hotel and get basic information.</p>

        <form id="hotelForm">
          <label for="hotelName">Hotel name or address</label>
          <div class="search-row">
            <input id="hotelName" type="text" placeholder="e.g. Sallés Hotel Pere IV Barcelona" required />
            <button type="submit">Find hotel</button>
          </div>
        </form>
        <p id="status" aria-live="polite"></p>
      </div>
    </section>

    <section class="card" id="resultCard" hidden>
      <div class="hotel-top">
        <div>
          <h2 id="name">-</h2>
          <p id="address">-</p>
          <p><strong>Phone:</strong> <span id="phone">-</span></p>
          <p><strong>Star rating:</strong> <span id="rating">-</span></p>
        </div>
        <div class="actions">
          <a id="websiteLink" target="_blank" rel="noopener">Hotel website</a>
          <a id="tripLink" target="_blank" rel="noopener">Tripadvisor</a>
          <a id="bookingLink" target="_blank" rel="noopener">Booking.com</a>
        </div>
      </div>

      <div class="workflow-actions">
        <button id="triggerWorkflowBtn" type="button">Trigger photo scraping workflow</button>
        <a id="driveFolderBtn" href="https://drive.google.com/" target="_blank" rel="noopener">Open Drive folder</a>
      </div>
      <p id="workflowStatus" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
